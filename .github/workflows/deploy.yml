name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test imports
      run: |
        python -c "from core.client import get_client; print('Client OK')"
        python -c "from tools.builtin import get_default_tools; print('Tools OK')"
        python -c "import run; print('Run OK')"
        python -c "from knowledge_graph_manager import FluidKnowledgeGraph; print('KG OK')"
    
    - name: Test KG Manager
      run: |
        python -c "
        from knowledge_graph_manager import FluidKnowledgeGraph, KnowledgeClassifier
        # Test classification
        result = KnowledgeClassifier.classify('Fix the divide by zero bug')
        assert result['primary_category'] == 'bug_fix', 'Classification failed'
        # Test KG binary export
        fkg = FluidKnowledgeGraph()
        info = fkg.get_binary_info()
        print('Binary check passed')
        "

  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install mkdocs
      run: pip install mkdocs-material
    
    - name: Build site
      run: mkdocs build
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./site
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4